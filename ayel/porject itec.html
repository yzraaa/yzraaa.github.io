<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC LOUNGE</title>
    <style>
        /* Added some basic CSS to make the nav look like a bar */
        .topnav {
            display: flex;
            background-color: #333;
            overflow: hidden;
            align-items: center;
        }
        .topnav a {
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }
        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }
        .topnav input {
            padding: 7px;
            border: none;
            margin-left: auto; /* Pushes search bar to the right */
            font-size: 17px;
        }
    </style>
</head>
<body>
    <h1>WELCOME TO JELLY M-USIC LOUNGE</h1>
    
    <!-- NAVIGATION BAR -->
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>

        <!-- SEARCH FORM START -->
        <!-- 
          1. method="GET" sends the data in the URL 
          2. action="URL" is where the search goes (currently set to Google)
        -->
        <form action="https://www.google.com/search" method="get" target="_blank">
            <!-- name="q" is required for search engines to read the input -->
            <input type="text" name="q" placeholder="Search for lyrics...">
        </form>
        <!-- SEARCH FORM END -->

    </div>

</body>
</html>
