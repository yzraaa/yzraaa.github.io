<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC LOUNGE</title>
    <style>
        .topnav {
            display: flex;
            background-color: #333;
            overflow: hidden;
            align-items: center;
        }
        
        .topnav a {
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }
        
        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }
        
        .topnav input {
            padding: 7px;
            border: none;
            margin-left: auto;
            font-size: 17px;
        }
        /* Optional: Add a cursor hint that these images are interactive */
        
        .album-cover {
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .album-cover:hover {
            transform: scale(1.05);
            /* Slight zoom effect on hover */
        }
    </style>
</head>

<body>
    <h1>WELCOME TO JELLY M-USIC LOUNGE</h1>

    <!-- NAVIGATION BAR -->
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>

        <form action="https://www.google.com/search" method="get" target="_blank">
            <input type="text" name="q" placeholder="Search for lyrics...">
        </form>
    </div>

    <hr>

    <!-- 
      We add onmouseenter and onmouseleave events directly to the images.
      This calls the JavaScript functions to play/stop specific songs.
    -->

    <!-- Song 1: Everything Has Changed -->
    <a href="every.html">
        <img src="ever.jpg" alt="everything has changed dp" width="200px" class="album-cover" onmouseenter="playPreview('audio1')" onmouseleave="stopPreview('audio1')">
    </a>

    <!-- Song 2: You (Assuming filename) -->
    <a href="you.html">
        <img src="you.jpg" alt="you dp" width="200px" class="album-cover" onmouseenter="playPreview('audio2')" onmouseleave="stopPreview('audio2')">
    </a>

    <!-- Song 3: Bawat (Assuming filename) -->
    <a href="bwt.html">
        <img src="bawat.jpg" alt="you dp" width="200px" class="album-cover" onmouseenter="playPreview('audio3')" onmouseleave="stopPreview('audio3')">
    </a>

    <!-- HIDDEN AUDIO ELEMENTS -->
    <!-- Replace 'src' with your actual music file paths -->
    <audio id="audio1" src="Taylor Swift - Everything Has Changed ft. Ed Sheeran.mp3"></audio>
    <audio id="audio2" src="Lloyd - You (Official Music Video) ft. Lil Wayne [YVLHaqeJzEk].mp3"></audio>
    <audio id="audio3" src="Munimuni - Bawat Piyesa (Official Lyric Video) [0E8B6yl4I5I].mp3"></audio>

    <!-- JAVASCRIPT LOGIC WITH TIMER -->
    <script>
        // Variable to store the timer ID so we can cancel it if the mouse leaves early
        var stopTimer;

        function playPreview(audioId) {
            var audio = document.getElementById(audioId);
            if (audio) {
                // 1. Reset to start and play
                audio.currentTime = 0;
                audio.play().catch(function(error) {
                    console.log("Playback prevented. Click page first.");
                });

                // 2. Set a timer to stop the audio after 5 seconds (5000 milliseconds)
                stopTimer = setTimeout(function() {
                    var audio = document.getElementById(audioId);
                    if (audio) {
                        audio.pause();
                        audio.currentTime = 0; // Reset to start after stopping
                    }
                }, 5000);
            }
        }

        function stopPreview(audioId) {
            var audio = document.getElementById(audioId);

            // 1. Clear the timer immediately if mouse leaves before 5 seconds
            if (stopTimer) {
                clearTimeout(stopTimer);
            }

            // 2. Pause the audio
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
        }
    </script>
</body>

</html>
